<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitlife | TMB</title>    
</head>
<body>
    <main>
        <section>
            <h1>Taxa Metabólica Basal</h1>

            <form>
                <label for="gender">Gênero</label>
                <select id="gender">
                    <option value="male">Masculino</option>
                    <option value="female">Feminino</option>
                </select>

                <label for="weight">Peso (kg)</label>
                <input type="number" id="weight" placeholder="Ex: 75" required>

                <label for="height">Altura (cm)</label>
                <input type="number" id="height" placeholder="Ex: 175" required>

                <label for="age">Idade (anos)</label>
                <input type="number" id="age" placeholder="Ex: 25" required>

                <button type="submit">Calcular Calorias</button>
            </form>

            <a href="../index.html">Voltar</a>
        </section>
    </main>
</body>
</html>
